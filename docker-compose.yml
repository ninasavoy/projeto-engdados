version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:3.0.6
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./pipeline:/opt/airflow/pipeline
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - ./monitoring:/opt/airflow/monitoring
    - airflow-plugins:/opt/airflow/plugins
  depends_on:
    postgres-airflow:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy

services:
  # ── Banco de dados principal (dados PRF) ──────────────────────────────────
  postgres:
    image: postgres:15
    container_name: prf-postgres
    environment:
      POSTGRES_USER: prf
      POSTGRES_PASSWORD: prf123
      POSTGRES_DB: prf_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "prf"]
      interval: 10s
      retries: 5

  # ── Banco de dados do Airflow ─────────────────────────────────────────────
  postgres-airflow:
    image: postgres:15
    container_name: prf-postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # ── RabbitMQ (fila de mensagens) ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: prf-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: prf
      RABBITMQ_DEFAULT_PASS: prf123
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      retries: 5

  # ── Prometheus (métricas) ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prf-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  # ── Grafana (dashboards de métricas) ─────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: prf-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana_provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  # ── Airflow Webserver ─────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: prf-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5

  # ── Airflow Scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: prf-airflow-scheduler
    command: scheduler

  # ── Airflow Init (cria usuário admin) ─────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: prf-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@prf.gov.br
    restart: "no"

volumes:
  postgres-data:
  postgres-airflow-data:
  rabbitmq-data:
  grafana-data:
  airflow-plugins: