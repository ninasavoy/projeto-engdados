global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Pushgateway — métricas dos jobs batch do pipeline (ingest/transform/load).
  # honor_labels preserva os labels enviados pelo pipeline (ex.: stage, source_year).
  - job_name: "prf_pipeline_pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
